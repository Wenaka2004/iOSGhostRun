<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOSGhostRun</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }
.container { max-width:900px; margin:0 auto; padding:16px; }
h1 { font-size:20px; padding:12px 0; text-align:center; color:#38bdf8; }
.card { background:#1e293b; border-radius:12px; padding:16px; margin-bottom:12px; }
.card-title { font-size:14px; color:#94a3b8; margin-bottom:10px; font-weight:600; }

.status-bar { display:flex; align-items:center; gap:10px; }
.status-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.status-dot.running { background:#22c55e; animation: pulse 2s infinite; }
.status-dot.waiting { background:#eab308; animation: pulse 2s infinite; }
.status-dot.error { background:#ef4444; }
.status-dot.stopped { background:#64748b; }
.status-dot.preparing { background:#3b82f6; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { font-size:15px; font-weight:500; }
.status-detail { font-size:12px; color:#94a3b8; margin-top:4px; }

.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
.metric { text-align:center; background:#0f172a; border-radius:8px; padding:10px 4px; }
.metric-val { font-size:22px; font-weight:700; color:#38bdf8; }
.metric-label { font-size:11px; color:#64748b; margin-top:2px; }

.controls { display:flex; gap:8px; margin-top:10px; }
.btn { flex:1; padding:10px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:0.2s; }
.btn-start { background:#22c55e; color:#fff; }
.btn-stop { background:#ef4444; color:#fff; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }

.params { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.param label { display:block; font-size:12px; color:#94a3b8; margin-bottom:4px; }
.param input { width:100%; padding:8px; background:#0f172a; border:1px solid #334155; border-radius:6px; color:#e2e8f0; font-size:14px; }
.param input:focus { outline:none; border-color:#38bdf8; }
.save-btn { margin-top:10px; padding:8px 20px; background:#3b82f6; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; }

.toggle { display:flex; align-items:center; gap:8px; margin-top:8px; }
.toggle input[type=checkbox] { width:18px; height:18px; accent-color:#22c55e; }
.toggle label { font-size:13px; color:#94a3b8; cursor:pointer; }

.route-info { background:#0f172a; border-radius:8px; padding:12px; font-size:13px; color:#94a3b8; }
.route-info strong { color:#38bdf8; }
.route-actions { display:flex; gap:8px; margin-top:8px; }
.route-actions .btn { font-size:12px; padding:6px 12px; flex:none; }
.btn-import { background:#059669; color:#fff; }
.btn-export { background:#0891b2; color:#fff; }
input[type=file] { display:none; }

.log-box { max-height:200px; overflow-y:auto; background:#0f172a; border-radius:8px; padding:8px; font-size:11px; font-family:monospace; }
.log-line { padding:2px 0; border-bottom:1px solid #1e293b; }
.log-line .time { color:#64748b; }
.log-line .module { color:#38bdf8; }
.log-line.error .msg { color:#ef4444; }
.log-line.warn .msg { color:#eab308; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#22c55e; color:#fff; padding:10px 24px; border-radius:8px; font-size:14px; display:none; z-index:99; }
.btn-shutdown { width:100%; padding:12px; background:#dc2626; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; margin-top:0; }
</style>
</head>
<body>
<div class="container">
  <h1>iOSGhostRun</h1>

  <div class="card">
    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <div class="status-text" id="statusText">初始化中...</div>
        <div class="status-detail" id="statusDetail"></div>
      </div>
    </div>
    <div class="metrics" id="metricsBox" style="display:none">
      <div class="metric"><div class="metric-val" id="mDist">0</div><div class="metric-label">距离 (m)</div></div>
      <div class="metric"><div class="metric-val" id="mSpeed">0</div><div class="metric-label">速度 (km/h)</div></div>
      <div class="metric"><div class="metric-val" id="mTime">0:00</div><div class="metric-label">时间</div></div>
    </div>
    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startRun()">开始跑步</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopRun()" disabled>停止</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">参数配置</div>
    <div class="params">
      <div class="param">
        <label>速度 (km/h)</label>
        <input type="number" id="cfgSpeed" step="0.5" min="1" max="20" value="8">
      </div>
      <div class="param">
        <label>速度波动 (km/h)</label>
        <input type="number" id="cfgVariance" step="0.5" min="0" max="5" value="1">
      </div>
      <div class="param">
        <label>路线偏移 (m)</label>
        <input type="number" id="cfgOffset" step="0.5" min="0" max="10" value="3">
      </div>
      <div class="param">
        <div class="toggle">
          <input type="checkbox" id="cfgAuto" checked>
          <label for="cfgAuto">插入设备后自动开始</label>
        </div>
      </div>
    </div>
    <button class="save-btn" onclick="saveConfig()">保存配置</button>
  </div>

  <div class="card">
    <div class="card-title">路线管理</div>
    <div class="route-info" id="routeInfo">未加载路线</div>
    <div class="route-actions">
      <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">导入 JSON</button>
      <button class="btn btn-export" onclick="exportRoute()">导出 JSON</button>
      <input type="file" id="fileInput" accept=".json" onchange="importRoute(event)">
    </div>
  </div>

  <div class="card">
    <div class="card-title">日志</div>
    <div class="log-box" id="logBox"></div>
  </div>

  <button class="btn btn-shutdown" onclick="shutdownPi()">关机</button>
</div>

<div class="toast" id="toast"></div>

<script>
var routeCoords = [];

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 2000);
}

function updateRouteInfo(pts) {
  routeCoords = pts || [];
  var el = document.getElementById('routeInfo');
  if (routeCoords.length < 2) { el.innerHTML = '未配置路线'; return; }
  var dist = 0;
  for (var i = 1; i < routeCoords.length; i++) {
    dist += haversine(routeCoords[i-1].lat, routeCoords[i-1].lon, routeCoords[i].lat, routeCoords[i].lon);
  }
  el.innerHTML = '<strong>' + routeCoords.length + '</strong> 个点，总距离约 <strong>' + (dist*1000).toFixed(0) + '</strong> 米';
}

function haversine(lat1,lon1,lat2,lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function exportRoute() {
  if (!routeCoords.length) { alert('没有路线'); return; }
  var b = new Blob([JSON.stringify(routeCoords,null,2)], {type:'application/json'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='route.json'; a.click();
}

function importRoute(e) {
  var f = e.target.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var pts = JSON.parse(ev.target.result);
      if (Array.isArray(pts) && pts.length>=2 && pts[0].lat!==undefined) {
        updateRouteInfo(pts);
        fetch('/api/route',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pts)})
        .then(function(){ toast('路线已导入'); });
      } else { alert('无效的路线文件'); }
    } catch(e) { alert('JSON 解析失败'); }
  };
  r.readAsText(f);
  e.target.value='';
}

function saveConfig() {
  fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    speed: parseFloat(document.getElementById('cfgSpeed').value),
    speedVariance: parseFloat(document.getElementById('cfgVariance').value),
    routeOffset: parseFloat(document.getElementById('cfgOffset').value),
    autoStart: document.getElementById('cfgAuto').checked
  })}).then(function(){ toast('配置已保存'); });
}

function startRun() {
  fetch('/api/start',{method:'POST'}).then(function(r){
    if(!r.ok) r.text().then(function(t){ alert('启动失败: '+t); });
    else toast('已启动');
  });
}

function stopRun() {
  fetch('/api/stop',{method:'POST'}).then(function(){ toast('已停止'); });
}

function shutdownPi() {
  if(!confirm('确定要关机吗？')) return;
  fetch('/api/shutdown',{method:'POST'}).then(function(){
    toast('正在关机...');
    document.getElementById('statusText').textContent = '正在关机...';
  });
}

var PHASE_MAP = {
  waiting_device: ['waiting','等待设备连接','请用 USB 连接 iPhone'],
  preparing: ['preparing','准备中...','挂载镜像/启动隧道'],
  running: ['running','跑步中',''],
  stopped: ['stopped','已停止','点击「开始跑步」启动'],
  error: ['error','错误','']
};

function updateState(s) {
  var info = PHASE_MAP[s.phase] || ['waiting',s.phase,''];
  document.getElementById('statusDot').className = 'status-dot ' + info[0];
  document.getElementById('statusText').textContent = info[1] + (s.deviceName ? ' - '+s.deviceName : '');
  document.getElementById('statusDetail').textContent = s.error || info[2];
  var isRunning = s.phase==='running';
  document.getElementById('metricsBox').style.display = isRunning ? '' : 'none';
  document.getElementById('btnStart').disabled = isRunning || s.phase==='waiting_device' || s.phase==='preparing';
  document.getElementById('btnStop').disabled = !isRunning;
}

function addLog(level,module,msg) {
  var box = document.getElementById('logBox');
  var now = new Date().toLocaleTimeString();
  box.innerHTML += '<div class="log-line '+level+'"><span class="time">'+now+'</span> <span class="module">['+module+']</span> <span class="msg">'+msg+'</span></div>';
  box.scrollTop = box.scrollHeight;
  while(box.children.length > 200) box.removeChild(box.firstChild);
}

function connectSSE() {
  var es = new EventSource('/api/events');
  es.addEventListener('server:state', function(e){ updateState(JSON.parse(e.data)); });
  es.addEventListener('running:position', function(e){
    var d = JSON.parse(e.data);
    document.getElementById('mDist').textContent = Math.round(d.distance*1000);
    document.getElementById('mSpeed').textContent = d.speed.toFixed(1);
    var sec = Math.floor(d.elapsedTimeMs/1000), min = Math.floor(sec/60);
    document.getElementById('mTime').textContent = min+':'+String(sec%60).padStart(2,'0');
  });
  es.addEventListener('running:completed', function(){ addLog('info','Running','跑步完成'); });
  es.addEventListener('log-event', function(e){ var l=JSON.parse(e.data); addLog(l.level,l.module,l.message); });
  es.onerror = function(){ es.close(); setTimeout(connectSSE, 3000); };
}

function init() {
  fetch('/api/status').then(function(r){ return r.json(); }).then(function(data){
    document.getElementById('cfgSpeed').value = data.config.speed;
    document.getElementById('cfgVariance').value = data.config.speedVariance;
    document.getElementById('cfgOffset').value = data.config.routeOffset;
    document.getElementById('cfgAuto').checked = data.config.autoStart;
    updateRouteInfo(data.config.route);
    updateState(data.server);
    return fetch('/api/logs');
  }).then(function(r){ return r.json(); }).then(function(logs){
    if(logs) logs.slice(-50).forEach(function(l){ addLog(l.level,l.module,l.message); });
    connectSSE();
  }).catch(function(e){
    document.getElementById('statusText').textContent = '连接失败';
    document.getElementById('statusDetail').textContent = e.message;
    setTimeout(init, 3000);
  });
}

init();
</script>
</body>
</html>
